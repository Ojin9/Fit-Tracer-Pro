<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitTracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="app-header">
      <div class="brand-row">
        <div>
          <h1>FitTracker</h1>
          <p>Jednoduchý deník tréninků s rychlým výběrem aktivity.</p>
        </div>
      </div>
    </header>

    <main class="content">
      <section class="card" id="workout-output"></section>

      <section class="card form-card">
        <div class="card-title">
          <h2>Přidat trénink</h2>
          <p>Vyber typ, délku a doplň další údaje podle potřeby.</p>
        </div>
        <form id="workout-form" class="workout-form">
          <div class="form-row">
            <label for="workout-type">Typ tréninku</label>
            <select id="workout-type" name="type">
              <option value="cardio">Kardio</option>
              <option value="strength">Síla</option>
            </select>
          </div>
          <div class="form-row">
            <label for="workout-activity">Aktivita</label>
            <select id="workout-activity" name="activity">
              <option value="beh">Běh</option>
              <option value="plavani">Plavání</option>
              <option value="cyklistika">Cyklistika</option>
              <option value="jine">Jiné</option>
            </select>
          </div>
          <div class="form-row">
            <label for="workout-duration">Délka (minuty)</label>
            <input id="workout-duration" name="durationMinutes" type="number" min="1" value="30" required>
          </div>
          <div class="form-row form-group cardio-field">
            <label for="workout-heart-rate">Průměrná tepová frekvence</label>
            <input id="workout-heart-rate" name="heartRate" type="number" min="40" max="220" value="140">
          </div>
          <div class="form-row form-group strength-field hidden">
            <label for="workout-weight">Váha (kg)</label>
            <input id="workout-weight" name="weight" type="number" min="1" value="50">
          </div>
          <div class="form-row form-group strength-field hidden">
            <label for="workout-difficulty">Obtížnost</label>
            <select id="workout-difficulty" name="difficulty">
              <option value="EASY">EASY</option>
              <option value="MEDIUM" selected>MEDIUM</option>
              <option value="HARD">HARD</option>
            </select>
          </div>
          <div class="button-row">
            <button type="submit" class="primary-button">Přidat trénink</button>
          </div>
        </form>
      </section>
    </main>

    <footer class="footer">
      <p>Školní projekt verze 1.0.</p>
    </footer>
  </div>

  <script src="dist/main.js"></script>
</body>
</html>
